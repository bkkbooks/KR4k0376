body:
  text: 張諮涼記天錫字公純嘏安定烏氐人張耳後也曾祖軌永嘉中為涼州刺史值京師大亂遂據涼土天錫篡位自立為涼州牧苻堅使將萇攻沒涼州天錫歸長安堅以為侍中北部尚書歸義侯從堅至壽陽堅軍敗遂南歸拜散騎常侍西平公世說注二案此引作張資涼州記下同天錫明鑒穎發英聲少著同上
